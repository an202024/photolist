<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GZ022.US.CI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        body { -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        #access-screen, #group-detail-page, #auth-modal { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        #access-screen { display: flex; align-items: center; justify-content: center; background: #f9fafb; }
        ::-webkit-scrollbar { display: none; }
        .photo-card { border-radius: 0.75rem; overflow: hidden; background: #fff; border: 1px solid #f3f4f6; }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <!-- 客户验证界面 / 管理员也可在此直接输入 admin2020 -->
    <div id="access-screen">
        <div class="w-full max-w-xs p-8 text-center">
            <div class="font-black text-2xl tracking-tighter text-blue-700 italic mb-10">GZ022.US.CI</div>
            <!-- 修改为 text 类型以支持 admin2020 字母输入 -->
            <input id="access-code" type="text" placeholder="输入访问码..." class="w-full border-2 border-gray-100 p-4 mb-4 text-center font-bold text-xl outline-none rounded-2xl shadow-sm">
            <button onclick="verifyAccess()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black active-scale shadow-lg">立即进入</button>
            
            <!-- 预留的显式管理员入口 -->
            <button onclick="openAuth()" class="text-gray-400 text-[10px] mt-8 uppercase font-bold tracking-widest">Admin Login</button>
            <p id="access-error" class="text-red-500 text-xs mt-4 hidden font-bold"></p>
        </div>
    </div>

    <!-- 导航栏 -->
    <header class="bg-white/90 backdrop-blur-md p-4 flex justify-between items-center border-b sticky top-0 z-50">
        <div class="font-black text-blue-700 italic tracking-tighter">GZ022.US.CI</div>
        <div id="admin-tools" class="hidden flex gap-2">
            <button onclick="generateNewCode()" class="bg-green-600 text-white px-3 py-1.5 rounded-full text-[10px] font-bold uppercase shadow-sm">生成密码库</button>
            <button onclick="userLogout()" class="text-[10px] font-bold text-red-500 border border-red-100 px-3 py-1.5 rounded-full">退出登录</button>
        </div>
    </header>

    <!-- 列表展示 -->
    <div id="main-grid" class="p-4 space-y-10 max-w-xl mx-auto"></div>

    <!-- 详情页 -->
    <div id="group-detail-page" class="overflow-y-auto">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-[10000] justify-between">
            <button onclick="closeGroupDetail()" class="text-gray-600 text-3xl px-2">←</button>
            <div id="admin-upload-ctrl" class="hidden">
                <input type="file" id="batch-file" multiple accept="image/*" class="hidden" onchange="handleBatchUpload()">
                <label for="batch-file" class="bg-black text-white px-5 py-2 rounded-full text-xs font-black cursor-pointer uppercase shadow-lg">Upload</label>
            </div>
        </div>
        <div id="related-grid" class="p-4 space-y-10"></div>
    </div>

    <!-- 专门的管理员登录弹窗 (以防万一) -->
    <div id="auth-modal" class="justify-center items-center px-10 bg-black/50">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
            <h3 class="font-black text-center mb-6 uppercase tracking-widest text-gray-800 italic">GZ022 Admin</h3>
            <input id="pwd-input" type="password" placeholder="请输入admin密码" class="w-full bg-gray-50 border p-4 mb-6 rounded-xl outline-none text-center font-bold">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">确认登录</button>
            <button onclick="closeAuth()" class="w-full text-gray-300 text-xs py-4 font-bold mt-2 uppercase">取消返回</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://sdqnikpywinxhjhnoshg.supabase.co";
        const SB_KEY = "sb_publishable_FaGea_hGHaXCNE-mm5kIpA_EWjyjXEV";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_PASS = "admin2020";

        let is_admin = false;
        let activeGroupId = null;

        window.onload = async () => {
            const auth = sessionStorage.getItem('gz_auth');
            if (auth === ADMIN_PASS) {
                is_admin = true;
                document.getElementById('access-screen').style.display = 'none';
                document.getElementById('admin-tools').classList.remove('hidden');
                loadData();
            } else if (auth === 'USER') {
                document.getElementById('access-screen').style.display = 'none';
                loadData();
            } else {
                document.getElementById('access-screen').style.display = 'flex';
            }
        };

        // 核心修复：verifyAccess 现在支持直接输入 admin2020
        async function verifyAccess() {
            const input = document.getElementById('access-code').value.trim();
            const errEl = document.getElementById('access-error');
            
            // 路径1：如果输入的是管理员密码
            if (input === ADMIN_PASS) {
                sessionStorage.setItem('gz_auth', ADMIN_PASS);
                location.reload();
                return;
            }

            // 路径2：查询 4 位访问码
            const { data, error } = await client.from('access_codes')
                .select('*')
                .eq('code', input)
                .eq('is_used', false)
                .maybeSingle();

            if (data) {
                await client.from('access_codes').update({ 
                    activated_at: new Date().toISOString(), 
                    is_used: true 
                }).eq('id', data.id);
                sessionStorage.setItem('gz_auth', 'USER');
                location.reload();
            } else {
                errEl.innerText = "码无效或已失效";
                errEl.classList.remove('hidden');
            }
        }

        async function generateNewCode() {
            const { count, data } = await client.from('access_codes')
                .select('*', { count: 'exact' })
                .eq('is_used', false)
                .order('id', { ascending: true })
                .limit(1)
                .maybeSingle();
            if (data) alert(`新密码：${data.code}\n剩余库存：${count}`);
            else alert("库容已空，请补货！");
        }

        async function loadData() {
            const { data } = await client.from('gallery').select('*').order('created_at', { ascending: true });
            const grid = document.getElementById('main-grid');
            grid.innerHTML = (data || []).map(item => `
                <div class="flex flex-col gap-3">
                    <div onclick="openGroupDetail(${item.group_id})" class="photo-card active-scale shadow-sm">
                        <img src="${item.img_url}" class="w-full h-auto block">
                    </div>
                    <div class="px-2 text-sm font-bold text-gray-700 uppercase tracking-tighter">${item.description || ""}</div>
                </div>`).join('');
        }

        async function openGroupDetail(id) {
            activeGroupId = id;
            document.getElementById('group-detail-page').style.display = 'flex';
            const { data } = await client.from('gallery').select('*').eq('group_id', id).order('created_at', { ascending: true });
            document.getElementById('related-grid').innerHTML = (data || []).map(item => `
                <div class="flex flex-col gap-3 pb-8 border-b border-gray-100">
                    <img src="${item.img_url}" class="w-full h-auto rounded-2xl">
                    ${is_admin ? `<button onclick="deletePhoto('${item.id}', '${item.img_url}')" class="text-red-500 text-[10px] font-bold self-end uppercase">Delete</button>` : ''}
                </div>`).join('');
            if(is_admin) document.getElementById('admin-upload-ctrl').classList.remove('hidden');
        }

        async function handleBatchUpload() {
            const files = document.getElementById('batch-file').files;
            for (let file of files) {
                const compressed = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1920 });
                const path = `GZ_${activeGroupId}_${Date.now()}.jpg`;
                await client.storage.from('photos').upload(path, compressed);
                const { data: pData } = client.storage.from('photos').getPublicUrl(path);
                await client.from('gallery').insert([{ img_url: pData.publicUrl, group_id: activeGroupId }]);
            }
            openGroupDetail(activeGroupId);
        }

        async function deletePhoto(id, url) {
            if(!confirm("删除？")) return;
            await client.storage.from('photos').remove([url.split('/').pop()]);
            await client.from('gallery').delete().eq('id', id);
            openGroupDetail(activeGroupId);
        }

        function handleLogin() {
            if(document.getElementById('pwd-input').value === ADMIN_PASS) {
                sessionStorage.setItem('gz_auth', ADMIN_PASS);
                location.reload();
            } else alert("错误");
        }

        function userLogout() { sessionStorage.clear(); location.reload(); }
        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function closeGroupDetail() { document.getElementById('group-detail-page').style.display = 'none'; }
    </script>
</body>
</html>
