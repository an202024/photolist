<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GZ022 深度诊断系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        #access-screen { position: fixed; inset: 0; background: #f9fafb; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="access-screen">
        <div class="w-full max-w-xs p-8 text-center bg-white rounded-3xl shadow-xl">
            <div class="font-black text-2xl text-blue-700 italic mb-8">GZ022.US.CI</div>
            <input id="access-code" type="text" placeholder="输入访问码或admin2020" class="w-full border-2 p-4 mb-4 text-center font-bold rounded-2xl outline-none">
            <button onclick="verifyAccess()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black mb-4">进入系统</button>
            <hr class="my-4">
            <p class="text-[10px] text-gray-400 mb-2 uppercase">诊断工具 (管理员专用)</p>
            <button onclick="generateNewCode()" class="w-full bg-green-600 text-white py-3 rounded-2xl font-bold text-sm">开始取码诊断</button>
        </div>
    </div>

    <div id="main-grid" class="p-4 space-y-8 hidden"></div>

    <script>
        const SB_URL = "https://sdqnikpywinxhjhnoshg.supabase.co";
        const SB_KEY = "sb_publishable_FaGea_hGHaXCNE-mm5kIpA_EWjyjXEV";
        const client = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_PASS = "admin2020";

        // 诊断逻辑函数
        async function generateNewCode() {
            const startTime = Date.now();
            try {
                // 1. 尝试直接拉取数据
                const { data, error, count, status, statusText } = await client
                    .from('access_codes')
                    .select('*', { count: 'exact' })
                    .eq('is_used', false)
                    .order('id', { ascending: true })
                    .limit(1)
                    .maybeSingle();

                const duration = Date.now() - startTime;

                let report = `【深度诊断报告】\n`;
                report += `------------------------\n`;
                report += `1. 响应耗时: ${duration}ms\n`;
                report += `2. HTTP状态码: ${status} (${statusText})\n`;

                if (error) {
                    report += `3. 错误类型: 数据库拒绝访问\n`;
                    report += `4. 错误代码: ${error.code}\n`;
                    report += `5. 详细信息: ${error.message}\n`;
                    report += `6. 提示建议: 请检查 RLS 或 SQL 权限授予。`;
                } else if (!data) {
                    report += `3. 错误类型: 数据透视为空\n`;
                    report += `4. 库容总计: ${count}\n`;
                    report += `5. 提示建议: 表里确实没数据，或 API 缓存了旧 Schema。请运行 NOTIFY 脚本。`;
                } else {
                    report += `3. 状态: 成功获取\n`;
                    report += `4. 提取密码: ${data.code}\n`;
                    report += `5. 剩余库存: ${count}\n`;
                }

                alert(report);
                console.log("完整诊断对象:", { data, error, count, status });

            } catch (e) {
                alert(`【网络层诊断报错】\n信息: ${e.message}\n可能原因: API URL 错误或手机端网络拦截。`);
            }
        }

        async function verifyAccess() {
            const input = document.getElementById('access-code').value.trim();
            if (input === ADMIN_PASS) {
                sessionStorage.setItem('gz_auth', ADMIN_PASS);
                location.reload();
            } else {
                // 普通用户验证逻辑
                const { data } = await client.from('access_codes').select('*').eq('code', input).eq('is_used', false).maybeSingle();
                if (data) {
                    await client.from('access_codes').update({ activated_at: new Date().toISOString(), is_used: true }).eq('id', data.id);
                    sessionStorage.setItem('gz_auth', 'USER');
                    location.reload();
                } else {
                    alert("验证失败");
                }
            }
        }

        window.onload = () => {
            const auth = sessionStorage.getItem('gz_auth');
            if (auth) {
                document.getElementById('access-screen').style.display = 'none';
                document.getElementById('main-grid').classList.remove('hidden');
                loadData();
            }
        };

        async function loadData() {
            const { data } = await client.from('gallery').select('*').order('created_at', { ascending: true });
            document.getElementById('main-grid').innerHTML = (data || []).map(item => `
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                    <img src="${item.img_url}" class="w-full h-auto">
                </div>
            `).join('');
        }
    </script>
</body>
</html>
